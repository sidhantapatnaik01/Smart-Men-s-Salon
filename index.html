.btn:active { transform: translateY(1px) !important; }

.btn-primary { background: var(--blue); color: #fff; box-shadow: 0 6px 20px rgba(37,99,235,.32); }

/* Photo placeholders — cinematic gradient + label */
.photo {
  position: relative;
  overflow: hidden;
  background: #1a1a1c;
  isolation: isolate;
}
.photo::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(120% 80% at 30% 20%, rgba(255,255,255,.18), transparent 50%),
    radial-gradient(140% 100% at 80% 90%, rgba(37,99,235,.22), transparent 60%),
    linear-gradient(160deg, #2a2a2e 0%, #15151a 60%, #0c0c10 100%);
  z-index: 0;
}
.photo::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 7px);
  z-index: 1;
  mix-blend-mode: overlay;
}
.photo > .label {
  position: absolute; left: 14px; bottom: 12px; z-index: 2;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.62);
}
.photo > .glyph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2; color: rgba(255,255,255,.18);
}

/* Photo variants — different tints to add rhythm */
.photo.warm::before {
  background:
    radial-gradient(120% 80% at 25% 25%, rgba(255,200,150,.18), transparent 55%),
    radial-gradient(140% 100% at 80% 90%, rgba(180,90,40,.28), transparent 60%),
    linear-gradient(160deg, #2b231c 0%, #1a120c 65%, #0e0805 100%);
}
.photo.cool::before {
  background:
    radial-gradient(120% 80% at 30% 20%, rgba(180,200,255,.16), transparent 55%),

    linear-gradient(160deg, #1c2230 0%, #0e1320 65%, #08090f 100%);
}
.photo.steel::before {
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.18), transparent 55%),
    linear-gradient(160deg, #36383d 0%, #1d1e22 60%, #0c0d11 100%);
}
.photo.amber::before {
  background:
    radial-gradient(110% 90% at 70% 30%, rgba(255,170,80,.22), transparent 55%),

}

/* Section */
.section { padding: 88px 0; }
.section-tight { padding: 64px 0; }
@media (max-width: 720px) { .section { padding: 56px 0; } .section-tight { padding: 40px 0; } .container { padding: 0 16px; } }

/* Marquee */
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Pulse */
@keyframes softPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(37,211,102,.45); }
  50%     { box-shadow: 0 0 0 14px rgba(37,211,102,0); }
}

/* Fade swap */
.swap-enter { opacity: 0; transform: translateY(8px); }
.swap-enter-active { opacity: 1; transform: translateY(0); transition: opacity .35s ease, transform .35s ease; }

/* ====== Scroll-triggered reveals ====== */
@keyframes revealUp {
  from { opacity: 0; transform: translateY(36px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes revealScale {
  from { opacity: 0; transform: scale(.92) translateY(18px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes revealLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes revealFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes heroLine {
  from { opacity: 0; transform: translateY(60px) skewY(2deg); }
  to   { opacity: 1; transform: translateY(0) skewY(0); }
}
@keyframes heroCta {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes heroMeta {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes floatBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes tabContent {
  from { opacity: 0; transform: translateY(14px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Reveal element — hidden until .is-visible */
.reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
  will-change: opacity, transform;
}
.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal.from-left {
  transform: translateX(-28px);
}
.reveal.from-left.is-visible {
  transform: translateX(0);
}
.reveal.from-scale {
  transform: scale(.92) translateY(18px);
}
.reveal.from-scale.is-visible {
  transform: scale(1) translateY(0);
}

/* Hero entrance */
.hero h1 .h-line {
  display: block;
  opacity: 0;
  animation: heroLine .9s cubic-bezier(.16,1,.3,1) forwards;
}
.hero h1 .h-line:nth-child(1) { animation-delay: .15s; }
.hero h1 .h-line:nth-child(2) { animation-delay: .35s; }

/* Rotating word */
.rot-word {
  display: inline-block;
  font-style: normal;
  color: var(--blue);
  transition: opacity .4s cubic-bezier(.16,1,.3,1), transform .4s cubic-bezier(.16,1,.3,1), filter .4s ease;
}
.rot-in {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
.rot-out {
  opacity: 0;
  transform: translateY(-18px);
  filter: blur(4px);
}
.hero .eyebrow { opacity: 0; animation: heroMeta .8s .05s cubic-bezier(.16,1,.3,1) forwards; }
.hero .sub { opacity: 0; animation: heroCta .8s .55s cubic-bezier(.16,1,.3,1) forwards; }
.hero .ctas { opacity: 0; animation: heroCta .8s .65s cubic-bezier(.16,1,.3,1) forwards; }
.hero .meta-row { opacity: 0; animation: heroMeta .8s .85s ease forwards; }

/* Tab content animated swap */
.tab-content-enter {
  animation: tabContent .45s cubic-bezier(.16,1,.3,1) forwards;
}

/* Service tile stagger children */
.stagger-grid > * {
  opacity: 0;
  transform: translateY(28px) scale(.97);
  transition: opacity .55s cubic-bezier(.16,1,.3,1), transform .55s cubic-bezier(.16,1,.3,1);
}
.stagger-grid.is-visible > *:nth-child(1) { transition-delay: 0s; }
.stagger-grid.is-visible > *:nth-child(2) { transition-delay: .08s; }
.stagger-grid.is-visible > *:nth-child(3) { transition-delay: .16s; }
.stagger-grid.is-visible > *:nth-child(4) { transition-delay: .24s; }
.stagger-grid.is-visible > *:nth-child(5) { transition-delay: .32s; }
.stagger-grid.is-visible > *:nth-child(6) { transition-delay: .40s; }
.stagger-grid.is-visible > * {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* Trust card hover glow */
.trust-item { transition: border-color .3s ease, transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s ease; }
.trust-item:hover { transform: translateY(-4px); box-shadow: var(--shadow-1); }

/* Service tile enhanced hover */
.service-tile { transition: transform .45s cubic-bezier(.16,1,.3,1), box-shadow .45s ease; }
.service-tile:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,.2); }
.service-tile .overlay { transition: opacity .4s ease; }
.service-tile:hover .overlay { opacity: .85; }

/* Gallery card hover */
.gallery-card { transition: transform .5s cubic-bezier(.16,1,.3,1); }
.gallery-card:hover { transform: scale(1.03); }

/* FAB floating bob */
.fab { animation: softPulse 2.4s ease-out infinite, floatBob 3s ease-in-out infinite; }

/* Ticker speed-up on hover */
.ticker:hover .ticker-track { animation-duration: 60s; }

/* Booking card — subtle entrance */
.booking-card { transition: box-shadow .4s ease, transform .4s ease; }

/* Map hover */
.map { transition: transform .4s cubic-bezier(.16,1,.3,1); }
.map:hover { transform: scale(1.01); }

/* Info block hover */
.info-block { transition: border-color .25s ease, transform .3s cubic-bezier(.16,1,.3,1); }
.info-block:hover { border-color: var(--ink); transform: translateY(-2px); }

/* Scrollbar hide for horizontal scrollers */
.no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* Inputs */
.field {
  display: flex; flex-direction: column; gap: 8px;
}
.field label {
  font-size: 12px; font-weight: 500; letter-spacing: .04em; color: var(--muted);
  text-transform: uppercase;
}
.input, .textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #fff;
  font: inherit;
  color: var(--ink);
  transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
}
.input:focus, .textarea:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(10,10,11,.06);
}
.textarea { resize: vertical; min-height: 96px; }

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  font-size: 14px; font-weight: 500;
  transition: all .18s ease;
  cursor: pointer;
  user-select: none;
}
.chip:hover { border-color: var(--ink); }
.chip.is-active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.chip .dot {
  width: 6px; height: 6px; border-radius: 999px; background: var(--blue);
  opacity: 0;
  transition: opacity .18s ease;
}
.chip.is-active .dot { opacity: 1; background: #fff; }

/* Sticky mobile CTA */
.mobile-cta {
  position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 60;
  display: flex; gap: 8px;
  background: rgba(10,10,11,.92);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px;
  padding: 8px;
  box-shadow: var(--shadow-2);
  padding-bottom: max(8px, calc(env(safe-area-inset-bottom) + 4px));
}
.mobile-cta .btn { height: 46px; padding: 0 14px; font-size: 14px; flex: 1; min-width: 0; }
.mobile-cta .btn:first-child { flex: 0 0 auto; padding: 0 18px; }
@media (max-width: 360px) {
  .mobile-cta .btn { height: 44px; font-size: 13px; padding: 0 10px; }
}
.mobile-cta .btn { flex: 1; height: 48px; min-width: 0; }
@media (min-width: 880px) { .mobile-cta { display: none; } }

/* Floating WhatsApp */
.fab {
  position: fixed; right: 18px; bottom: 88px; z-index: 65;
  width: 56px; height: 56px; border-radius: 999px;
  background: #25D366; color: #07210F;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 30px rgba(37,211,102,.4);
  animation: softPulse 2.4s ease-out infinite;
}
@media (max-width: 880px) { .fab { display: none !important; } }
@media (min-width: 880px) { .fab { bottom: 24px; right: 24px; width: 58px; height: 58px; animation: softPulse 2.4s ease-out infinite, floatBob 3s ease-in-out infinite; } }

/* Card */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
}

/* Service tile */
.service-tile {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 4 / 5;
  cursor: pointer;
  transition: transform .35s cubic-bezier(.2,.7,.2,1);
}
.service-tile:hover { transform: translateY(-4px); }
.service-tile .photo { position: absolute; inset: 0; }
.service-tile .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 35%, rgba(0,0,0,.78) 100%);
  z-index: 2;
}
.service-tile .meta {
  position: absolute; left: 18px; right: 18px; bottom: 18px; z-index: 3;
  color: #fff;
}
.service-tile .meta .name {
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.02em;
  line-height: 1.05;
}
.service-tile .meta .sub {
  margin-top: 6px;
  font-size: 13px; color: rgba(255,255,255,.72);
}
.service-tile .num {
  position: absolute; left: 18px; top: 16px; z-index: 3;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px; color: rgba(255,255,255,.65);
  letter-spacing: .12em;
}
.service-tile .arrow {
  position: absolute; right: 16px; top: 14px; z-index: 3;
  width: 36px; height: 36px; border-radius: 999px;
  background: rgba(255,255,255,.92); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: transform .25s ease;
}
.service-tile:hover .arrow { transform: rotate(-45deg); }

/* Tab pill */
.cat-tab {
  position: relative;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 20px;
  border-radius: 999px;
  font-weight: 600; font-size: 15px;
  color: var(--muted);
  transition: color .2s ease;
  white-space: nowrap;
}
.cat-tab.is-active { color: #fff; }
.cat-tab .count {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px; letter-spacing: .1em;
  opacity: .7;
}

/* Trust grid item */
.trust-item {
  display: flex; flex-direction: column; gap: 16px;
  padding: 28px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  transition: border-color .2s ease, transform .2s ease;
}
.trust-item:hover { border-color: var(--ink); transform: translateY(-2px); }
.trust-item .ico {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--bg-soft);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink);
}

/* Marquee tracks */
.gallery-track {
  display: flex;
  gap: 16px;
  width: max-content;
  animation: marquee 60s linear infinite;
}
.gallery-track:hover { animation-play-state: paused; }
.gallery-card {
  width: 280px; height: 360px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.gallery-card .caption {
  position: absolute; left: 14px; bottom: 14px; z-index: 3;
  color: #fff;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
}
.gallery-card .caption small {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  font-size: 10.5px;
  color: rgba(255,255,255,.7);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.gallery-card .scrim {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.7) 100%);
}

/* Nav */
.topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 40;
  padding: 14px 0;
  background: rgba(10, 10, 11, 0.55);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,.06);
  transition: background .3s ease, border-color .3s ease;
}
@media (max-width: 720px) {
  .topnav { padding: 10px 0; }
  .topnav .container { padding: 0 16px; }
}
.topnav .row {
  display: flex; align-items: center; justify-content: space-between;
}
.topnav a { color: rgba(255,255,255,.85); font-size: 14px; font-weight: 500; }
.topnav a:hover { color: #fff; }
.topnav .links { display: none; gap: 28px; }
@media (min-width: 880px) { .topnav .links { display: flex; } }

/* Logo mark */
.logo-mark {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700; letter-spacing: -0.02em;
  font-size: 17px;
  color: #fff;
  white-space: nowrap;
}
@media (max-width: 480px) {
  .logo-mark { font-size: 15px; gap: 8px; }
  .logo-mark .badge { width: 28px; height: 28px; font-size: 12px; }
  .logo-mark .submark { display: none; }
}
.logo-mark .badge {
  display: none;
}
.logo-mark .logo-img {
  height: 44px;
  width: auto;
  border-radius: 4px;
}
.logo-mark.dark { color: var(--ink); }
.logo-mark.dark .badge { background: var(--ink); }

/* Helpers */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.spacer { flex: 1; }

/* Booking form summary */
.summary {
  background: #0A0A0B;
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  position: relative;
  overflow: hidden;
}
.summary::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 36px;
  background: #18181B;
  border-bottom: 1px solid #2a2a2e;
}
.summary::after {
  content: "● ● ●";
  position: absolute; top: 8px; left: 14px;
  color: #3f3f46;
  font-size: 10px;
  letter-spacing: 4px;
}
.summary .body { padding-top: 24px; }
.summary .accent { color: #25D366; }

/* Hero */
.hero {
  position: relative;
  min-height: min(100vh, 780px);
  background: #0A0A0B;
  color: #fff;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.hero .bg {
  position: absolute; inset: 0; z-index: 0;
}
.hero .bg::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,10,11,.55) 0%, rgba(10,10,11,.4) 40%, rgba(10,10,11,.92) 100%);
}
.hero .content {
  position: relative; z-index: 2;
  flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
  padding-top: 120px;
  padding-bottom: 40px;
}
.hero h1 {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: clamp(44px, 9vw, 120px);
  line-height: 0.9;
  letter-spacing: -0.04em;
  margin: 0;
  text-wrap: balance;
  word-break: break-word;
}
.hero h1 em {
  font-style: normal;
  color: var(--blue);
}
.hero .sub {
  font-size: clamp(14px, 1.4vw, 17px);
  color: rgba(255,255,255,.72);
  max-width: 520px;
  margin-top: 16px;
}
.hero .ctas {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-top: 20px;
}
.hero .meta-row {
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  margin-top: 24px;
  font-size: 12px;
  color: rgba(255,255,255,.55);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.hero .meta-row .dot { width: 5px; height: 5px; border-radius: 999px; background: #25D366; box-shadow: 0 0 0 4px rgba(37,211,102,.18); }
@media (max-width: 720px) {
  .hero .content { padding-top: 90px; padding-bottom: 28px; }
  .hero h1 { font-size: clamp(38px, 11vw, 64px); }
  .hero .meta-row { gap: 10px 14px; font-size: 11px; }
  .hero .meta-row span:nth-child(2),
  .hero .meta-row span:nth-child(4) { display: none; }
}

/* Section heading common */
.sec-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; margin-bottom: 36px;
  flex-wrap: wrap;
}
@media (max-width: 720px) { .sec-head { margin-bottom: 24px; gap: 12px; } }
.sec-head h2 {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700;
  font-size: clamp(30px, 5vw, 64px);
  letter-spacing: -0.035em;
  line-height: 0.95;
  margin: 0;
}
.sec-head h2 em { font-style: normal; color: var(--blue); }
.sec-head .right { display: none; max-width: 320px; color: var(--muted); font-size: 14px; }
@media (min-width: 880px) { .sec-head .right { display: block; } }

/* Service showcase */
.showcase {
  background: var(--bg-soft);
  border-radius: 0;
}
.cat-bar {
  display: flex; gap: 6px; padding: 6px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 999px;
  width: fit-content;
  position: relative;
  margin-bottom: 28px;
  overflow-x: auto;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 480px) { .cat-bar .cat-tab { padding: 10px 14px; font-size: 14px; } }
.cat-bar .indicator {
  position: absolute;
  top: 6px; bottom: 6px;
  background: var(--ink);
  border-radius: 999px;
  transition: transform .35s cubic-bezier(.2,.7,.2,1), width .35s cubic-bezier(.2,.7,.2,1);
  z-index: 0;
}
.cat-bar .cat-tab { z-index: 1; }

/* Final CTA */
.final-cta {
  position: relative;
  background: #050507;
  color: #fff;
  overflow: hidden;
  padding: 140px 0 120px;
}
@media (max-width: 720px) { .final-cta { padding: 90px 0 90px; } }
.final-cta .bg {
  position: absolute; inset: 0; z-index: 0;
  opacity: .55;
}
.final-cta .bg::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(70% 70% at 50% 50%, rgba(37,99,235,.18), transparent 60%),
              linear-gradient(180deg, transparent 0%, rgba(5,5,7,.85) 80%);
}
.final-cta .inner {
  position: relative; z-index: 1; text-align: center;
}
.final-cta h2 {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: clamp(40px, 10vw, 144px);
  letter-spacing: -0.04em;
  line-height: 0.88;
  margin: 0;
  text-wrap: balance;
}
.final-cta h2 em { font-style: normal; color: var(--blue); }
.final-cta .sub { color: rgba(255,255,255,.6); margin-top: 22px; font-size: 15px; }
.final-cta .cta { margin-top: 40px; display: inline-flex; }

/* Map embed */
.map {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 5/4;
  background: #f8fafc;
  border: 1px solid var(--line);
}
.map iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* Footer */
.footer {
  background: #0A0A0B;
  color: rgba(255,255,255,.7);
  padding: 64px 0 28px;
}
.footer .grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
}
@media (min-width: 880px) {
  .footer .grid { grid-template-columns: 2fr 1fr 1fr 1fr; gap: 64px; }
}
.footer h4 {
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: rgba(255,255,255,.55);
  margin: 0 0 18px;
  font-weight: 500;
}
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer ul a { color: rgba(255,255,255,.85); font-size: 15px; }
.footer ul a:hover { color: #fff; }
.footer .bottom {
  margin-top: 56px; padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  font-size: 12px; color: rgba(255,255,255,.45);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* Booking */
.booking-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--line);
  padding: 28px;
  box-shadow: var(--shadow-1);
}
@media (max-width: 720px) { .booking-card { padding: 20px; border-radius: 20px; } }
@media (min-width: 880px) { .booking-card { padding: 40px; } }
.booking-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
@media (min-width: 720px) {
  .booking-grid.two { grid-template-columns: 1fr 1fr; }
}
.day-pill, .time-pill {
  padding: 12px 14px; border-radius: 14px; border: 1px solid var(--line);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; transition: all .15s ease; min-width: 64px;
  background: #fff;
}
.day-pill .dom { font-weight: 700; font-size: 18px; }
.day-pill .dow { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: 'JetBrains Mono', monospace; }
.day-pill.is-active, .time-pill.is-active {
  background: var(--ink); color: #fff; border-color: var(--ink);
}
.day-pill.is-active .dow, .time-pill.is-active .sub { color: rgba(255,255,255,.7); }
.time-pill { font-weight: 600; font-size: 14px; }
.scroll-x {
  display: flex; gap: 10px; overflow-x: auto;
  padding-bottom: 6px;
  margin: 0 -4px;
  padding-left: 4px; padding-right: 4px;
}

/* Hero billboard ticker */
.ticker {
  border-top: 1px solid rgba(255,255,255,.08);
  border-bottom: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.02);
  overflow: hidden;
  padding: 14px 0;
}
.ticker-track {
  display: flex; gap: 56px;
  width: max-content;
  animation: marquee 40s linear infinite;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: 18px;
  color: rgba(255,255,255,.7);
  white-space: nowrap;
}
.ticker-track .star { color: var(--blue); }

<script type="text/babel">
// ── useTweaks ───────────────────────────────────────────────────────────────
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}
</script>

function useInView(opts = {}) {
  const { threshold = 0.15, once = true } = opts;
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); if (once) io.disconnect(); }
      else if (!once) setVisible(false);
    }, { threshold });
    io.observe(el);
    return () => io.disconnect();
  }, [threshold, once]);
  return [ref, visible];
}

/* ============== Booking ============== */
const ALL_SERVICES = [
  "Haircut", "Beard Trim", "Clean Shave", "Hair Styling",
  "Hair Straightening", "Hair Treatment", "Beard Shaping",
  "Clean Up", "Skin Brightening", "Facial",
  "Groom Package", "Wedding Groom Package",
];
const TIME_SLOTS = ["10:00 AM", "12:00 PM", "02:00 PM", "04:00 PM", "06:00 PM", "08:00 PM"];

function getNextDays(n = 7) {
  const days = [];
  const dowNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const today = new Date();
  for (let i = 0; i < n; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push({
      iso: d.toISOString().slice(0,10),
      dom: d.getDate(),
      dow: i === 0 ? "Today" : dowNames[d.getDay()],
    });
  }
  return days;
}

function Booking({ preselectedService, onClearPreselect, t }) {
  const days = useMemo(() => getNextDays(8), []);
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [services, setServices] = useState([]);
  const [day, setDay] = useState(days[0].iso);
  const [time, setTime] = useState("06:00 PM");
  const [notes, setNotes] = useState("");

  useEffect(() => {
    if (preselectedService && !services.includes(preselectedService)) {
      setServices(s => [...s, preselectedService]);
      onClearPreselect && onClearPreselect();
      const el = document.getElementById("book");
      if (el) el.scrollIntoView({behavior: "smooth", block: "start"});
    }
  }, [preselectedService]);

  const toggleService = (s) =>
    setServices(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]);

  const dayLabel = useMemo(() => {
    const d = days.find(x => x.iso === day);
    if (!d) return "";
    return d.dow === "Today" ? "Today" : `${d.dow} ${d.dom}`;
  }, [day, days]);

  const message =
`Hi SMART Men's Salon,

I'd like to book a session.

Name: ${name || "—"}
Phone: ${phone || "—"}

Selected Service:
${services.length ? services.join(" + ") : "—"}

Preferred Date:
${dayLabel}

Preferred Time:
${time}

Additional Notes:
${notes || "—"}`;

  const waHref = `https://wa.me/${t.whatsappNumber}?text=${encodeURIComponent(message)}`;
  const filled = name && phone && services.length;

  return (
    <section className="section" id="book" style={{background:"var(--bg-soft)"}}>
      <div className="container">
        <Reveal>
          <div className="sec-head">
            <div>
              <div className="eyebrow" style={{marginBottom: 14}}>04 — BOOK</div>
              <h2>Three steps.<br/><em>Confirm on WhatsApp.</em></h2>
            </div>
            <div className="right">
              We'll never ask for payment online. Your slot is confirmed by our team within minutes on WhatsApp.
            </div>
          </div>
        </Reveal>

        <Reveal delay={0.1} variant="from-scale">
          <div className="booking-card">
            <div style={{display: "grid", gridTemplateColumns: "1fr", gap: 28}}>
              <div>
                <StepLabel n={1} title="Who's coming in?" />
                <div className="booking-grid two">
                  <div className="field">
                    <label>Name</label>
                    <input className="input" type="text" placeholder="Your name" value={name} onChange={e => setName(e.target.value)}/>
                  </div>
                  <div className="field">
                    <label>Phone</label>
                    <input className="input" type="tel" placeholder="98XXXXXXXX" value={phone} onChange={e => setPhone(e.target.value)}/>
                  </div>
                </div>
              </div>

              <div>
                <StepLabel n={2} title="What do you need?" hint={services.length ? `${services.length} selected` : "Tap to select"} />
                <div style={{display:"flex", flexWrap:"wrap", gap: 8}}>
                  {ALL_SERVICES.map(s => (
                    <button
                      key={s}
                      className={"chip " + (services.includes(s) ? "is-active" : "")}
                      onClick={() => toggleService(s)}
                      type="button"
                    >
                      <span className="dot"></span>
                      {s}
                      {services.includes(s) ? <Icon.Check size={12}/> : <Icon.Plus size={12}/>}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <StepLabel n={3} title="When works for you?" />
                <div style={{display:"flex", flexDirection:"column", gap: 16}}>
                  <div className="scroll-x no-scrollbar">
                    {days.map(d => (
                      <button
                        key={d.iso}
                        type="button"
                        className={"day-pill " + (day === d.iso ? "is-active" : "")}
                        onClick={() => setDay(d.iso)}
                      >
                        <span className="dom">{d.dom}</span>
                        <span className="dow">{d.dow}</span>
                      </button>
                    ))}
                  </div>
                  <div className="scroll-x no-scrollbar">
                    {TIME_SLOTS.map(ts => (
                      <button
                        key={ts}
                        type="button"
                        className={"time-pill " + (time === ts ? "is-active" : "")}
                        onClick={() => setTime(ts)}
                      >
                        {ts}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <div className="field">
                <label>Notes (optional)</label>
                <textarea
                  className="textarea"
                  placeholder="e.g. Low fade haircut, keep beard medium length."
                  value={notes}
                  onChange={e => setNotes(e.target.value)}
                />
              </div>

              <div style={{display:"grid", gridTemplateColumns: "1fr", gap: 20}}>
                <a
                  href={filled ? waHref : "#"}
                  onClick={(e) => { if (!filled) e.preventDefault(); }}
                  target="_blank"
                  rel="noopener"
                  className="btn btn-wa"
                  style={{
                    height: 60, fontSize: 16,
                    opacity: filled ? 1 : 0.55,
                    cursor: filled ? "pointer" : "not-allowed",
                  }}
                >
                  <Icon.WhatsApp size={18}/>
                  Continue on WhatsApp
                  <Icon.Arrow size={16}/>
                </a>
                <p style={{margin:0, fontSize: 12, color:"var(--muted)", textAlign:"center"}}>
                  {filled
                    ? "Opens WhatsApp with your booking message ready to send."
                    : "Fill in name, phone, and at least one service to continue."}
                </p>
              </div>
            </div>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

/* ============== Sticky controls ============== */
function StickyMobile({ t }) {
  const [show, setShow] = useState(false);

  useEffect(() => {
    const handleScroll = () => {
      // Show sticky CTA after scrolling past 300px (approx hero top section)
      setShow(window.scrollY > 300);
    };
    window.addEventListener("scroll", handleScroll, { passive: true });
    handleScroll(); // Check on mount
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  return (
    <div style={{ opacity: show ? 1 : 0, transition: "opacity 0.3s ease", pointerEvents: show ? "auto" : "none" }}>
      <a href="#book" className="fab" aria-label="Book on WhatsApp">
        <Icon.WhatsApp size={26}/>
      </a>
      <div className="mobile-cta">
        <a href={`tel:${t.phone.replace(/\s/g,'')}`} className="btn btn-light" style={{background:"rgba(255,255,255,.08)", color:"#fff", border:"1px solid rgba(255,255,255,.16)"}}>
          <Icon.Phone size={15}/> Call
        </a>
        <a href="#book" className="btn btn-wa">
          <Icon.WhatsApp size={16}/> Book on WhatsApp
        </a>
      </div>
    </div>
  );
}
