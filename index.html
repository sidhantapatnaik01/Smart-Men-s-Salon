}
@media (max-width: 880px) {

}

img { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;

  gap: 10px;
  height: 52px;
  padding: 0 22px;
  border-radius: 999px;
  font-weight: 600;

  letter-spacing: -0.01em;

}
.btn:active { transform: translateY(1px) !important; }
.btn:hover { transform: translateY(-2px); }
.btn-primary { background: var(--blue); color: #fff; box-shadow: 0 6px 20px rgba(37,99,235,.32); }
.btn-primary:hover { background: var(--blue-700); }
.btn-dark { background: var(--ink); color: #fff; }
.btn-dark:hover { background: var(--ink-2); }
.btn-light { background: #fff; color: var(--ink); border: 1px solid var(--line); }

.btn-ghost-dark { background: rgba(255,255,255,.08); color: #fff; border: 1px solid rgba(255,255,255,.18); backdrop-filter: blur(10px); }
.btn-ghost-dark:hover { background: rgba(255,255,255,.14); }

}

/* Photo placeholders — cinematic gradient + label */
.photo {
  position: relative;
  overflow: hidden;
  background: #1a1a1c;
  isolation: isolate;
}
.photo::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(120% 80% at 30% 20%, rgba(255,255,255,.18), transparent 50%),
    radial-gradient(140% 100% at 80% 90%, rgba(37,99,235,.22), transparent 60%),
    linear-gradient(160deg, #2a2a2e 0%, #15151a 60%, #0c0c10 100%);
  z-index: 0;
}
.photo::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 7px);
  z-index: 1;
  mix-blend-mode: overlay;
}
.photo > .label {
  position: absolute; left: 14px; bottom: 12px; z-index: 2;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.62);
}
.photo > .glyph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2; color: rgba(255,255,255,.18);
}

/* Photo variants — different tints to add rhythm */
.photo.warm::before {
  background:
    radial-gradient(120% 80% at 25% 25%, rgba(255,200,150,.18), transparent 55%),
    radial-gradient(140% 100% at 80% 90%, rgba(180,90,40,.28), transparent 60%),
    linear-gradient(160deg, #2b231c 0%, #1a120c 65%, #0e0805 100%);
}
.photo.cool::before {
  background:
    radial-gradient(120% 80% at 30% 20%, rgba(180,200,255,.16), transparent 55%),
    radial-gradient(140% 100% at 80% 90%, rgba(37,99,235,.32), transparent 60%),
    linear-gradient(160deg, #1c2230 0%, #0e1320 65%, #08090f 100%);
}
.photo.steel::before {
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.18), transparent 55%),
    linear-gradient(160deg, #36383d 0%, #1d1e22 60%, #0c0d11 100%);
}
.photo.amber::before {
  background:
    radial-gradient(110% 90% at 70% 30%, rgba(255,170,80,.22), transparent 55%),
    radial-gradient(140% 100% at 30% 100%, rgba(120,60,20,.32), transparent 60%),
    linear-gradient(160deg, #2a1f15 0%, #16100a 65%, #0a0604 100%);
}

/* Section */
.section { padding: 88px 0; }
.section-tight { padding: 64px 0; }
@media (max-width: 720px) { .section { padding: 56px 0; } .section-tight { padding: 40px 0; } .container { padding: 0 16px; } }

/* Marquee */
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Pulse */
@keyframes softPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(37,211,102,.45); }
  50%     { box-shadow: 0 0 0 14px rgba(37,211,102,0); }
}

/* Fade swap */
.swap-enter { opacity: 0; transform: translateY(8px); }
.swap-enter-active { opacity: 1; transform: translateY(0); transition: opacity .35s ease, transform .35s ease; }

/* ====== Scroll-triggered reveals ====== */
@keyframes revealUp {
  from { opacity: 0; transform: translateY(36px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes revealScale {
  from { opacity: 0; transform: scale(.92) translateY(18px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes revealLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes revealFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes heroLine {
  from { opacity: 0; transform: translateY(60px) skewY(2deg); }
  to   { opacity: 1; transform: translateY(0) skewY(0); }
}
@keyframes heroCta {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes heroMeta {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes floatBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes tabContent {
  from { opacity: 0; transform: translateY(14px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Reveal element — hidden until .is-visible */
.reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
  will-change: opacity, transform;
}
.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal.from-left {
  transform: translateX(-28px);
}
.reveal.from-left.is-visible {
  transform: translateX(0);
}
.reveal.from-scale {
  transform: scale(.92) translateY(18px);
}
.reveal.from-scale.is-visible {
  transform: scale(1) translateY(0);
}

/* Hero entrance */
.hero h1 .h-line {
  display: block;
  opacity: 0;
  animation: heroLine .9s cubic-bezier(.16,1,.3,1) forwards;
}
.hero h1 .h-line:nth-child(1) { animation-delay: .15s; }
.hero h1 .h-line:nth-child(2) { animation-delay: .35s; }

/* Rotating word */
.rot-word {
  display: inline-block;
  font-style: normal;
  color: var(--blue);
  transition: opacity .4s cubic-bezier(.16,1,.3,1), transform .4s cubic-bezier(.16,1,.3,1), filter .4s ease;
}
.rot-in {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
.rot-out {
  opacity: 0;
  transform: translateY(-18px);
  filter: blur(4px);
}
.hero .eyebrow { opacity: 0; animation: heroMeta .8s .05s cubic-bezier(.16,1,.3,1) forwards; }
.hero .sub { opacity: 0; animation: heroCta .8s .55s cubic-bezier(.16,1,.3,1) forwards; }
.hero .ctas { opacity: 0; animation: heroCta .8s .65s cubic-bezier(.16,1,.3,1) forwards; }
.hero .meta-row { opacity: 0; animation: heroMeta .8s .85s ease forwards; }

/* Tab content animated swap */
.tab-content-enter {
  animation: tabContent .45s cubic-bezier(.16,1,.3,1) forwards;
}

/* Service tile stagger children */
.stagger-grid > * {
  opacity: 0;
  transform: translateY(28px) scale(.97);
  transition: opacity .55s cubic-bezier(.16,1,.3,1), transform .55s cubic-bezier(.16,1,.3,1);
}
.stagger-grid.is-visible > *:nth-child(1) { transition-delay: 0s; }
.stagger-grid.is-visible > *:nth-child(2) { transition-delay: .08s; }
.stagger-grid.is-visible > *:nth-child(3) { transition-delay: .16s; }
.stagger-grid.is-visible > *:nth-child(4) { transition-delay: .24s; }
.stagger-grid.is-visible > *:nth-child(5) { transition-delay: .32s; }
.stagger-grid.is-visible > *:nth-child(6) { transition-delay: .40s; }
.stagger-grid.is-visible > * {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.gallery-card:hover { transform: scale(1.03); }

/* FAB floating bob */
.fab { animation: softPulse 2.4s ease-out infinite, floatBob 3s ease-in-out infinite; }

/* Ticker speed-up on hover */
.ticker:hover .ticker-track { animation-duration: 60s; }

/* Booking card — subtle entrance */
.booking-card { transition: box-shadow .4s ease, transform .4s ease; }

/* Map hover */
.map { transition: transform .4s cubic-bezier(.16,1,.3,1); }
.map:hover { transform: scale(1.01); }

/* Info block hover */
.info-block { transition: border-color .25s ease, transform .3s cubic-bezier(.16,1,.3,1); }
.info-block:hover { border-color: var(--ink); transform: translateY(-2px); }

/* Scrollbar hide for horizontal scrollers */
.no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* Inputs */
.field {
  display: flex; flex-direction: column; gap: 8px;
}
.field label {
  font-size: 12px; font-weight: 500; letter-spacing: .04em; color: var(--muted);
  text-transform: uppercase;
}
.input, .textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #fff;
  font: inherit;
  color: var(--ink);
  transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
}
.input:focus, .textarea:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(10,10,11,.06);
}
.textarea { resize: vertical; min-height: 96px; }

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  font-size: 14px; font-weight: 500;
  transition: all .18s ease;
  cursor: pointer;
  user-select: none;
}
.chip:hover { border-color: var(--ink); }
.chip.is-active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.chip .dot {
  width: 6px; height: 6px; border-radius: 999px; background: var(--blue);
  opacity: 0;
  transition: opacity .18s ease;
}
.chip.is-active .dot { opacity: 1; background: #fff; }

/* Sticky mobile CTA */
.mobile-cta {
  position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 60;
  display: flex; gap: 8px;
  background: rgba(10,10,11,.92);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px;
  padding: 8px;
  box-shadow: var(--shadow-2);
  padding-bottom: max(8px, calc(env(safe-area-inset-bottom) + 4px));
}
.mobile-cta .btn { height: 46px; padding: 0 14px; font-size: 14px; flex: 1; min-width: 0; }
.mobile-cta .btn:first-child { flex: 0 0 auto; padding: 0 18px; }
@media (max-width: 360px) {
  .mobile-cta .btn { height: 44px; font-size: 13px; padding: 0 10px; }
}
.mobile-cta .btn { flex: 1; height: 48px; min-width: 0; }
@media (min-width: 880px) { .mobile-cta { display: none; } }

/* Floating WhatsApp */
.fab {
  position: fixed; right: 18px; bottom: 88px; z-index: 65;
  width: 56px; height: 56px; border-radius: 999px;
  background: #25D366; color: #07210F;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 30px rgba(37,211,102,.4);
  animation: softPulse 2.4s ease-out infinite;
}
@media (max-width: 880px) { .fab { display: none !important; } }
@media (min-width: 880px) { .fab { bottom: 24px; right: 24px; width: 58px; height: 58px; animation: softPulse 2.4s ease-out infinite, floatBob 3s ease-in-out infinite; } }

/* Card */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
}

/* Service tile */
.service-tile {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 4 / 5;
  cursor: pointer;
  transition: transform .35s cubic-bezier(.2,.7,.2,1);
}
.service-tile:hover { transform: translateY(-4px); }
.service-tile .photo { position: absolute; inset: 0; }
.service-tile .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 35%, rgba(0,0,0,.78) 100%);
  z-index: 2;
}
.service-tile .meta {
  position: absolute; left: 18px; right: 18px; bottom: 18px; z-index: 3;
  color: #fff;
}
.service-tile .meta .name {

  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.02em;
  line-height: 1.05;
}
.service-tile .meta .sub {
  margin-top: 6px;
  font-size: 13px; color: rgba(255,255,255,.72);
}
.service-tile .num {
  position: absolute; left: 18px; top: 16px; z-index: 3;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px; color: rgba(255,255,255,.65);
  letter-spacing: .12em;
}
.service-tile .arrow {
  position: absolute; right: 16px; top: 14px; z-index: 3;
  width: 36px; height: 36px; border-radius: 999px;
  background: rgba(255,255,255,.92); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: transform .25s ease;
}
.service-tile:hover .arrow { transform: rotate(-45deg); }

/* Tab pill */
.cat-tab {
  position: relative;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 20px;
  border-radius: 999px;
  font-weight: 600; font-size: 15px;
  color: var(--muted);

  white-space: nowrap;
}
.cat-tab.is-active { color: #fff; }
.cat-tab .count {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px; letter-spacing: .1em;

}

/* Trust grid item */
.trust-item {
  display: flex; flex-direction: column; gap: 16px;
  padding: 28px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  transition: border-color .2s ease, transform .2s ease;
}
.trust-item:hover { border-color: var(--ink); transform: translateY(-2px); }
.trust-item .ico {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--bg-soft);

  color: var(--ink);
}

/* Marquee tracks */
.gallery-track {
  display: flex;
  gap: 16px;
  width: max-content;
  animation: marquee 60s linear infinite;
}
.gallery-track:hover { animation-play-state: paused; }
.gallery-card {
  width: 280px; height: 360px;

  position: relative;
  flex-shrink: 0;
}
.gallery-card .caption {

  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
}
.gallery-card .caption small {

  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  font-size: 10.5px;
  color: rgba(255,255,255,.7);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.gallery-card .scrim {

/* Nav */
.topnav {

.topnav .links { display: none; gap: 28px; }
@media (min-width: 880px) { .topnav .links { display: flex; } }

/* Logo mark */
.logo-mark {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700; letter-spacing: -0.02em;

}
@media (max-width: 480px) {
  .logo-mark { font-size: 15px; gap: 8px; }
  .logo-mark .badge { width: 28px; height: 28px; font-size: 12px; }

}
.logo-mark .badge {
  display: none;
}
.logo-mark .logo-img {

  border-radius: 4px;

}

/* Helpers */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.spacer { flex: 1; }

/* Booking form summary */
.summary {
  background: #0A0A0B;

  border-radius: var(--radius-lg);

/* Hero */
.hero {

  background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
.twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
  background:rgba(0,0,0,.06);user-select:none}
.twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
  background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
  transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
.twk-seg.dragging .twk-seg-thumb{transition:none}
.twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
  background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
  border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;
  overflow-wrap:anywhere}
.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
  background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
.twk-toggle[data-on="1"]{background:#34c759}
.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
  background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
.twk-toggle[data-on="1"] i{transform:translateX(14px)}
.twk-chips{display:flex;gap:6px}
.twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;
  padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;
  box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);
  transition:transform .12s cubic-bezier(.3,.7,.4,1),box-shadow .12s}
.twk-chip:hover{transform:translateY(-1px);
  box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
.twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
.twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;
  display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
.twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
.twk-chip>span>i:first-child{box-shadow:none}
.twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

/* ============== Production fixes: prevent mobile horizontal overflow ==============
   Root cause: flex/grid children default to min-width:auto (content-size).
   When .scroll-x has wide internal content (8 day-pills + 6 time-pills),
   it forces the parent column wider than the viewport — even though
   .scroll-x has overflow-x:auto. The fix is to restore min-width:0 on
   every flex/grid item in the chain so overflow-x:auto can actually
   contain the scroller. */
html { overflow-x: hidden; }
body { overflow-x: hidden; max-width: 100vw; }

/* Booking card chain — every level must allow shrinking */
.booking-card { min-width: 0; max-width: 100%; }
.booking-card > div,
.booking-card > div > div,
.booking-card > div > div > div { min-width: 0; max-width: 100%; }
.booking-card .field { min-width: 0; max-width: 100%; }
.booking-card .scroll-x { min-width: 0; max-width: 100%; }
.booking-card .input,
.booking-card .textarea { max-width: 100%; }

/* Section content guards */
.section .container,
.showcase .container,
.final-cta .container,
.footer .container { min-width: 0; max-width: 100%; }
.section .container > * { min-width: 0; }

/* Visit + footer grid items */
.visit-grid > * { min-width: 0; max-width: 100%; }
.footer .grid > * { min-width: 0; }

/* Hero meta-row wrap on small screens — already wraps but force min-width */
.hero .meta-row > * { min-width: 0; }

/* Service tile chain */
.stagger-grid > * { min-width: 0; max-width: 100%; }

/* Cat bar already has overflow-x:auto; ensure it can shrink */
.cat-bar { min-width: 0; }

/* Chip group (services) — let chips wrap freely */
.chip { max-width: 100%; }

/* Tablet/phone refinements — tighten where the bleed showed up */
@media (max-width: 480px) {
  .container { padding: 0 14px; }
  .booking-card { padding: 16px; border-radius: 18px; }
  .booking-card > div { gap: 22px !important; }
  .day-pill, .time-pill { min-width: 56px; padding: 10px 12px; }
  .chip { padding: 9px 12px; font-size: 13.5px; }
  .scroll-x { gap: 8px; }
  .booking-card .input, .booking-card .textarea {
    padding: 12px 14px; border-radius: 12px;
  }
  /* Step number circle + title must not overflow */
  .booking-card h2, .booking-card .field label { word-break: break-word; }
  .hero h1 { font-size: clamp(34px, 10.5vw, 56px); }
  .sec-head h2 { font-size: clamp(28px, 8.5vw, 44px); }
  .final-cta h2 { font-size: clamp(36px, 11vw, 64px); }
}
@media (max-width: 380px) {
  .container { padding: 0 12px; }
  .booking-card { padding: 14px; }
  .day-pill, .time-pill { min-width: 52px; padding: 9px 10px; font-size: 13px; }
  .day-pill .dom { font-size: 16px; }
  .chip { padding: 8px 11px; font-size: 13px; gap: 6px; }
  .btn { font-size: 14px; padding: 0 18px; }
}

/* Touch targets accessibility */
@media (hover: none) {
  .btn:hover { transform: none; }
}

/* Print styles — for clients who print directions/booking */
@media print {
  .topnav, .mobile-cta, .fab, .ticker, .gallery-track, .twk-panel { display: none !important; }
  .hero { min-height: auto; background: #fff; color: #000; }
  .final-cta { background: #fff; color: #000; }
  body { color: #000; background: #fff; }
}

/* Reduced motion — respect user preference */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
  .gallery-track, .ticker-track { animation: none; }
  .fab { animation: none; }
}
</style>
